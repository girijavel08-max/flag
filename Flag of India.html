<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flag Project</title>
    <style>
        body{
            text-align: center;
        }
        .saffron{
            background-color:#FF9933 ;
            height: 100px;
            width: 500px;
        }
        .white{
            background-color: white;
            height: 100px;
            width: 500px;
            position: relative;
        }
        .green{
            background-color: #138808;
            height: 100px;
            width: 500px;
        }
        .chakra{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
        }
        .flag{
            width: 300px;
            margin:0;
        }


    </style>
</head>
<body>
    <div class="flag">
    <h1>India's Flag!</h1>
    <div class="saffron"></div>
    <div class="white">
        <img class="chakra" src="./asset/ashoka-chakra-india-high-quality-png-1.png" alt="Ashoka Chakra">
    </div>
    <div class="green"></div>
    </div>
</body>
</html>
